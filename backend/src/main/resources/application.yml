spring:
  application:
    name: life-narrative-archive-backend
  datasource:
    url: jdbc:h2:mem:lna;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.moonshot.ai/v1}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:kimi-k2.5}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

server:
  address: 0.0.0.0
  port: 8080

app:
  site:
    base-url: ${APP_SITE_BASE_URL:http://8.137.14.17}
    api-base-url: ${APP_API_BASE_URL:http://8.137.14.17:8080/api}
  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://8.137.14.17}
    jwt-secret: ${APP_JWT_SECRET:change-me-before-production}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:../uploads}
  rag:
    faiss-index-dir: ${APP_FAISS_INDEX_DIR:../data/faiss}
